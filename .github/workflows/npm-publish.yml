name: Publish npm package

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build, pack, and publish
    if: github.repository == 'agentic-in/inferoa'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Print toolchain versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Test
        timeout-minutes: 5
        run: npm test

      - name: Pack dry run
        run: npm pack --dry-run

      - name: Read package coordinates
        id: package
        run: |
          node --input-type=module <<'NODE' >> "$GITHUB_OUTPUT"
          import pkg from "./package.json" with { type: "json" };
          console.log(`name=${pkg.name}`);
          console.log(`version=${pkg.version}`);
          NODE

      - name: Check npm version
        id: npm
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} is already published; skipping."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.npm.outputs.published != 'true'
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "${NPM_TOKEN:-}" ]; then
            echo "Publishing with NPM_TOKEN."
            NODE_AUTH_TOKEN="$NPM_TOKEN" npm publish --access public --tag latest
          else
            echo "Publishing with npm Trusted Publishing OIDC."
            echo "For the first release, configure the npm Trusted Publisher for this package or add an NPM_TOKEN repository secret."
            npm publish --access public --tag latest
          fi
